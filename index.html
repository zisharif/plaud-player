<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Plaud Audio Player</title>
<style>
  body { font-family: system-ui, sans-serif; background: #111; color: #eee;
         display: flex; flex-direction: column; align-items: center;
         justify-content: center; min-height: 100vh; margin: 0; padding: 1rem; }
  h1 { font-size: 1.05rem; font-weight: 600; text-align: center; max-width: 40rem; }
  .t { color: #7ec8ff; font-variant-numeric: tabular-nums; }
  audio { width: min(90vw, 40rem); margin-top: 1rem; }
  #status { margin-top: .8rem; color: #999; font-size: .85rem; text-align: center; }
  a { color: #7ec8ff; }
</style>
</head>
<body>
<h1 id="title">Loading…</h1>
<audio id="player" controls preload="metadata"></audio>
<div id="status"></div>
<script>
(function () {
  const q = new URLSearchParams(location.search);
  const id = q.get("id");                 // Google Drive file ID
  const t  = parseFloat(q.get("t") || "0"); // seek seconds
  const n  = q.get("n") || "recording";   // display name
  const fmt = s => { s = Math.floor(s);
    return `${Math.floor(s/3600)}:${String(Math.floor(s%3600/60)).padStart(2,"0")}:${String(s%60).padStart(2,"0")}`; };
  document.getElementById("title").innerHTML =
    `${n} — <span class="t">${fmt(t)}</span>`;
  document.title = `${n} @ ${fmt(t)}`;
  if (!id) { document.getElementById("status").textContent = "Missing ?id= parameter."; return; }

  const player = document.getElementById("player");
  const status = document.getElementById("status");
  // Drive direct-stream endpoints (file must be shared: anyone with link).
  // Try newest endpoint first (byte-range support = reliable seeking), then legacy.
  const sources = [
    `https://drive.usercontent.google.com/download?id=${encodeURIComponent(id)}&export=download`,
    `https://drive.google.com/uc?export=download&id=${encodeURIComponent(id)}`,
  ];
  let srcIdx = 0;
  player.src = sources[srcIdx];

  let seeked = false;
  const seek = () => {
    if (!seeked && t > 0 && t < (player.duration || Infinity)) {
      try { player.currentTime = t; seeked = Math.abs(player.currentTime - t) < 2; }
      catch (e) { /* iOS may refuse before playback — retried on play */ }
    }
  };
  player.addEventListener("loadedmetadata", () => {
    seek();
    status.textContent = "Tap play. Starts at " + fmt(t) + ".";
  });
  // iOS Safari: seeks before user-initiated playback are often ignored — re-apply.
  player.addEventListener("play", seek);
  player.addEventListener("playing", seek);
  player.addEventListener("error", () => {
    srcIdx += 1;
    if (srcIdx < sources.length) {          // try next streaming endpoint
      seeked = false;
      player.src = sources[srcIdx];
      player.load();
      return;
    }
    status.innerHTML = "Could not stream directly (sharing off or Drive blocked it).<br>" +
      `Open in <a href="https://drive.google.com/file/d/${encodeURIComponent(id)}/view" target="_blank">Google Drive</a>` +
      ` and seek to <b>${fmt(t)}</b> manually.`;
  });
})();
</script>
</body>
</html>
